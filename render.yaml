services:
  - type: web
    name: open-sch-yachal-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://register.yachalhousegh.com,https://open-sch-yachal.pages.dev
      - key: ADMIN_TOKEN
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: REGISTRATION_NOTIFICATION_EMAILS
        value: maamekrakuezoom@gmail.com,blackbird77ad@gmail.com

  - type: web
    name: open-sch-yachal-client
    runtime: static site
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
